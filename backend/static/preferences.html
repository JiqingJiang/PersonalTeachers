<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>偏好设置 - PersonalTeachers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .nav-link { transition: all 0.2s; }
        .nav-link:hover { transform: translateY(-2px); }
        .nav-link.active { border-bottom: 2px solid white; }
        input[type="range"] { -webkit-appearance: none; height: 8px; border-radius: 4px; background: #e2e8f0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #667eea; cursor: pointer; }
    </style>
</head>
<body>
    <div x-data="preferencesApp()" class="min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-white/10 backdrop-blur-md border-b border-white/20">
            <div class="max-w-6xl mx-auto px-4">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">📚</span>
                        <span class="text-white font-bold text-xl">PersonalTeachers</span>
                    </div>
                    <div class="flex items-center space-x-6">
                        <a href="/" class="nav-link text-white/80 hover:text-white px-3 py-2 text-sm font-medium">🏠 首页</a>
                        <a href="/preferences.html" class="nav-link text-white/80 hover:text-white px-3 py-2 text-sm font-medium active">⚙️ 偏好设置</a>
                        <a href="/history.html" class="nav-link text-white/80 hover:text-white px-3 py-2 text-sm font-medium">📚 历史语录</a>
                        <a href="/docs" target="_blank" class="nav-link text-white/80 hover:text-white px-3 py-2 text-sm font-medium">📖 API文档</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容 -->
        <div class="max-w-6xl mx-auto px-4 py-12">
            <!-- 页面标题 -->
            <div class="text-center mb-12">
                <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">⚙️ 偏好设置</h1>
                <p class="text-xl text-white/80">自定义你的每日推送内容</p>
            </div>

            <!-- 快捷操作 -->
            <div class="flex justify-center space-x-4 mb-8">
                <button @click="saveConfig()"
                        :disabled="loading.save"
                        class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading.save">💾 保存配置</span>
                    <span x-show="loading.save">保存中...</span>
                </button>
                <button @click="resetToDefault()"
                        class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-xl font-medium transition-all">
                    🔄 恢复默认
                </button>
            </div>

            <!-- 配置区域 -->
            <div class="space-y-6">
                <!-- 推送设置 -->
                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                    <div class="bg-gradient-to-r from-blue-600 to-cyan-600 px-8 py-6">
                        <h2 class="text-2xl font-bold text-white">📬 推送设置</h2>
                    </div>
                    <div class="p-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">每日推送时间</label>
                                <input type="time" x-model="config.delivery.time" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">每日语录数量</label>
                                <input type="number" x-model="config.quote_count" min="1" max="20" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">接收邮箱</label>
                                <input type="email" x-model="config.user.email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div class="flex items-center">
                                <label class="flex items-center cursor-pointer">
                                    <input type="checkbox" x-model="config.delivery.enabled" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                                    <span class="ml-3 text-sm font-medium text-gray-700">启用每日自动推送</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AI模型选择 -->
                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                    <div class="bg-gradient-to-r from-purple-600 to-pink-600 px-8 py-6">
                        <h2 class="text-2xl font-bold text-white">🤖 AI模型选择</h2>
                    </div>
                    <div class="p-8">
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-3">主模型</label>
                            <div class="grid grid-cols-3 gap-4">
                                <template x-for="model in aiModels" :key="model.id">
                                    <button @click="config.ai_model.primary = model.id"
                                            :class="config.ai_model.primary === model.id ? 'ring-2 ring-purple-500 bg-purple-50' : 'hover:bg-gray-50'"
                                            class="p-4 border-2 rounded-xl transition-all">
                                        <div class="text-2xl mb-2" x-text="model.emoji"></div>
                                        <div class="font-medium text-gray-800" x-text="model.name"></div>
                                        <div class="text-xs text-gray-500 mt-1" x-text="model.desc"></div>
                                    </button>
                                </template>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-3">备选顺序（主模型失败时使用）</label>
                            <div class="space-y-2">
                                <template x-for="(modelId, index) in config.ai_model.fallback_order" :key="modelId">
                                    <div class="flex items-center space-x-4 p-3 bg-gray-50 rounded-lg">
                                        <span class="text-lg font-bold text-gray-400" x-text="index + 1"></span>
                                        <span class="flex-1 font-medium" x-text="getAiModelById(modelId)?.name"></span>
                                        <button @click="moveFallbackUp(index)" :disabled="index === 0" class="text-gray-400 hover:text-gray-600 disabled:opacity-30">⬆️</button>
                                        <button @click="moveFallbackDown(index)" :disabled="index === config.ai_model.fallback_order.length - 1" class="text-gray-400 hover:text-gray-600 disabled:opacity-30">⬇️</button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 导师类型偏好 -->
                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                    <div class="bg-gradient-to-r from-amber-500 to-orange-500 px-8 py-6">
                        <h2 class="text-2xl font-bold text-white">👥 导师类型偏好</h2>
                    </div>
                    <div class="p-8">
                        <p class="text-gray-600 mb-6 text-sm">调整不同类型导师的推送占比（总和应为100%）</p>
                        <div class="space-y-6">
                            <template x-for="(pref, key) in mentorTypes" :key="key">
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <div class="flex items-center space-x-2">
                                            <span class="text-2xl" x-text="pref.emoji"></span>
                                            <span class="font-medium text-gray-700" x-text="pref.name"></span>
                                        </div>
                                        <span class="text-sm font-bold text-purple-600" x-text="Math.round(config.mentor_preferences[key] * 100) + '%'"></span>
                                    </div>
                                    <input type="range" x-model="config.mentor_preferences[key]" min="0" max="1" step="0.05"
                                           @input="normalizeMentorPreferences()"
                                           class="w-full">
                                </div>
                            </template>
                        </div>
                        <div class="mt-6 p-4 rounded-xl" :class="totalMentorPref === 1.0 ? 'bg-green-50 text-green-700' : 'bg-yellow-50 text-yellow-700'">
                            <span x-show="totalMentorPref === 1.0">✅ 总计: 100% - 配置有效</span>
                            <span x-show="totalMentorPref !== 1.0">⚠️ 总计: <span x-text="Math.round(totalMentorPref * 100) + '%'"></span> - 建议调整为100%</span>
                        </div>
                    </div>
                </div>

                <!-- 关键词权重 -->
                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                    <div class="bg-gradient-to-r from-green-500 to-teal-500 px-8 py-6">
                        <div class="flex items-center justify-between">
                            <h2 class="text-2xl font-bold text-white">🎯 关键词权重</h2>
                            <button @click="expandAll = !expandAll" class="text-white/80 hover:text-white text-sm">
                                <span x-show="!expandAll">📂 展开全部</span>
                                <span x-show="expandAll">📁 收起全部</span>
                            </button>
                        </div>
                    </div>
                    <div class="p-8">
                        <p class="text-gray-600 mb-6 text-sm">调整各关键词的关注程度（1.0为默认，2.0为双倍频率，0.5为减半）</p>
                        <div class="space-y-4">
                            <template x-for="(quadrant, qIndex) in keywordQuadrants" :key="qIndex">
                                <div class="border border-gray-200 rounded-xl overflow-hidden">
                                    <button @click="quadrant.expanded = !quadrant.expanded"
                                            class="w-full px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                                        <div class="flex items-center space-x-3">
                                            <span class="text-2xl" x-text="quadrant.emoji"></span>
                                            <div class="text-left">
                                                <div class="font-bold text-gray-800" x-text="quadrant.name"></div>
                                                <div class="text-sm text-gray-500" x-text="quadrant.keywords.length + '个关键词'"></div>
                                            </div>
                                        </div>
                                        <span class="text-gray-400" x-text="quadrant.expanded ? '▼' : '▶'"></span>
                                    </button>
                                    <div x-show="quadrant.expanded" class="px-6 pb-4 space-y-3">
                                        <template x-for="keyword in quadrant.keywords" :key="keyword">
                                            <div class="flex items-center space-x-4">
                                                <span class="w-20 text-sm text-gray-700" x-text="keyword"></span>
                                                <input type="range" x-model="config.keyword_weights[keyword]" min="0" max="5" step="0.1"
                                                       class="flex-1">
                                                <span class="w-16 text-right text-sm font-bold text-purple-600" x-text="config.keyword_weights[keyword] + 'x'"></span>
                                                <button @click="config.keyword_weights[keyword] = 1.0" class="text-gray-400 hover:text-gray-600">↺</button>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部保存按钮 -->
            <div class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50">
                <button @click="saveConfig()"
                        :disabled="loading.save"
                        class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-full font-bold shadow-2xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center space-x-2">
                    <span x-show="!loading.save">💾 保存配置</span>
                    <span x-show="loading.save">保存中...</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function preferencesApp() {
            return {
                config: {
                    user: { name: '', age: 26, profession: '', email: '' },
                    delivery: { time: '08:00', enabled: true },
                    quote_count: 10,
                    ai_model: { primary: 'glm', fallback_order: ['glm', 'deepseek', 'gemini', 'minimax'] },
                    mentor_preferences: { historical: 0.3, modern: 0.4, future_self: 0.2, common: 0.1 },
                    keyword_weights: {}
                },
                loading: { save: false },
                expandAll: false,
                aiModels: [
                    { id: 'glm', name: 'GLM-4', emoji: '🇨🇳', desc: '国产模型' },
                    { id: 'deepseek', name: 'DeepSeek', emoji: '🔍', desc: '性价比高' },
                    { id: 'gemini', name: 'Gemini', emoji: '✨', desc: 'Google AI' },
                    { id: 'minimax', name: 'MiniMax', emoji: '⚡', desc: '备选方案' }
                ],
                mentorTypes: {
                    historical: { name: '历史人物', emoji: '📜' },
                    modern: { name: '现代人物', emoji: '💼' },
                    future_self: { name: '未来自己', emoji: '⏩' },
                    common: { name: '普通百姓', emoji: '👷' }
                },
                keywordQuadrants: [],

                get totalMentorPref() {
                    return Object.values(this.config.mentor_preferences).reduce((a, b) => a + b, 0);
                },

                async init() {
                    await this.loadConfig();
                    await this.loadKeywords();
                },

                async loadConfig() {
                    try {
                        const response = await fetch('/api/config');
                        if (response.ok) {
                            this.config = await response.json();
                        }
                    } catch (error) {
                        console.error('Failed to load config:', error);
                    }
                },

                async loadKeywords() {
                    try {
                        const response = await fetch('/api/keywords');
                        if (response.ok) {
                            const data = await response.json();
                            this.keywordQuadrants = [
                                { name: '🟢 生存与根基', emoji: '🟢', keywords: data.quadrant_1_foundation?.map(k => k.name) || [], expanded: false },
                                { name: '🔵 关系与情感', emoji: '🔵', keywords: data.quadrant_2_connection?.map(k => k.name) || [], expanded: false },
                                { name: '🟡 成长与认知', emoji: '🟡', keywords: data.quadrant_3_growth?.map(k => k.name) || [], expanded: false },
                                { name: '🟣 终极与哲思', emoji: '🟣', keywords: data.quadrant_4_ultimate?.map(k => k.name) || [], expanded: false }
                            ];
                            // Initialize keyword weights if not set
                            this.keywordQuadrants.forEach(q => {
                                q.keywords.forEach(k => {
                                    if (!(k in this.config.keyword_weights)) {
                                        this.config.keyword_weights[k] = 1.0;
                                    }
                                });
                            });
                        }
                    } catch (error) {
                        console.error('Failed to load keywords:', error);
                    }
                },

                async saveConfig() {
                    this.loading.save = true;
                    try {
                        const response = await fetch('/api/config', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.config)
                        });
                        if (response.ok) {
                            alert('✅ 配置保存成功！');
                        } else {
                            alert('❌ 保存失败：' + (await response.text()));
                        }
                    } catch (error) {
                        alert('❌ 保存失败：' + error.message);
                    } finally {
                        this.loading.save = false;
                    }
                },

                async resetToDefault() {
                    if (confirm('确定要恢复默认配置吗？所有自定义权重将被重置。')) {
                        this.keywordQuadrants.forEach(q => {
                            q.keywords.forEach(k => {
                                this.config.keyword_weights[k] = 1.0;
                            });
                        });
                        this.config.mentor_preferences = { historical: 0.3, modern: 0.4, future_self: 0.2, common: 0.1 };
                        this.config.ai_model.primary = 'glm';
                        this.config.delivery.time = '08:00';
                        this.config.quote_count = 10;
                        await this.saveConfig();
                    }
                },

                normalizeMentorPreferences() {
                    // Auto-normalize can be added here if needed
                },

                moveFallbackUp(index) {
                    if (index > 0) {
                        const temp = this.config.ai_model.fallback_order[index];
                        this.config.ai_model.fallback_order[index] = this.config.ai_model.fallback_order[index - 1];
                        this.config.ai_model.fallback_order[index - 1] = temp;
                    }
                },

                moveFallbackDown(index) {
                    if (index < this.config.ai_model.fallback_order.length - 1) {
                        const temp = this.config.ai_model.fallback_order[index];
                        this.config.ai_model.fallback_order[index] = this.config.ai_model.fallback_order[index + 1];
                        this.config.ai_model.fallback_order[index + 1] = temp;
                    }
                },

                getAiModelById(id) {
                    return this.aiModels.find(m => m.id === id);
                }
            };
        }
    </script>
</body>
</html>
