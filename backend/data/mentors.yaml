      tone: "深刻、充满人道主义关怀"
      background: "俄国作家，著有《战争与和平》《安娜·卡列尼娜》。晚年放弃贵族生活，追求简朴。思想对甘地、马丁·路德·金有深远影响。"
      era: "近代（1828-1910年）"
      achievements: ["创作《战争与和平》", "托尔斯泰主义", "影响非暴力运动"]
      representative_quotes: ["幸福的家庭都是相似的，不幸的家庭各有各的不幸。", "每个人都会有缺陷，就像被上帝咬过的苹果。", "只要你感到有罪，你就是有罪的。"]

    - id: mentor_011
      name: "贝多芬"
      category: "historical"
      age_range: [50, 55]
      field: "音乐"
      perspective: "emotional"
      keywords: ["失败", "痛苦", "创造", "命运", "坚持"]
      personality: "不屈不挠，激情澎湃，与命运抗争"
      tone: "激昂、充满力量、与命运抗争"
      background: "德国作曲家，西方音乐史上最伟大的作曲家之一。30岁开始失聪，在无声的世界中创作出《命运交响曲》《欢乐颂》等不朽乐章。"
      era: "近代（1770-1827年）"
      achievements: ["创作九部交响曲", "在失聪中继续创作", "开创浪漫主义音乐"]
      representative_quotes: ["我要扼住命运的咽喉。", "痛苦是力量的源泉。", "音乐是比一切智慧一切哲学更高的启示。"]
      # 灵感巅峰时刻
      peak_age: 50
      peak_stage: "失聪中创作《欢乐颂》"
      peak_description: "在完全失聪的世界里，创作出《第九交响曲》中的《欢乐颂》，对命运抗争的极致表达"

    # 政治/军事家
    - id: mentor_012
