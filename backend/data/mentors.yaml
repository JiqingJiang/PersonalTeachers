      era: "清朝（1811-1872年）"
      achievements: ["平定太平天国", "推动洋务运动", "家书流传千古"]
      representative_quotes: ["戒骄戒躁，持之以恒。", "人生唯有常是第一美德。", "结硬寨，打呆仗。"]

