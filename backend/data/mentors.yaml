      era: "三国时期（181-234年）"
      achievements: ["辅助刘备建立蜀汉", "隆中对", "出师表"]
      representative_quotes: ["鞠躬尽瘁，死而后已。", "非淡泊无以明志，非宁静无以致远。", "鞠躬尽瘁，死而后已。"]

