[pytest]
# Pytest配置文件

# 测试目录
testpaths = tests

# 测试文件模式
python_files = test_*.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 命令行选项
addopts =
    # 详细输出
    -v
    # 显示本地变量（失败时）
    -l
    # 显示print输出
    -s
    # 显示测试覆盖率
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # 忽略的路径
    --ignore=tests/integration
    --ignore=venv
    --ignore=__pycache__

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试（需要真实API/数据库）
    performance: 性能测试
    slow: 慢速测试

# 异步测试支持
asyncio_mode = auto

# 最小Python版本
minversion = 8.0

# 警告设置
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = app
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
