<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日人生导师智慧</title>
    <style>
        /* Email client resets */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
        a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }

        /* Quote cards — generated by Python backend */
        .quote-card {
            margin-bottom: 18px;
            padding: 22px 22px 22px 26px;
            background-color: #FFFDF8;
            border-left: 4px solid #E8A838;
            border-radius: 0 8px 8px 0;
        }

        .quote-meta {
            font-size: 12px;
            color: #A08860;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .quote-content {
            font-size: 15px;
            line-height: 1.9;
            color: #2D2B26;
        }

        /* Mobile */
        @media only screen and (max-width: 620px) {
            .email-container { width: 100% !important; max-width: 100% !important; }
            .email-content { padding: 24px 18px !important; }
            .email-header { padding: 32px 20px !important; }
            .header-title { font-size: 22px !important; }
            .quote-card { padding: 16px 16px 16px 20px !important; }
        }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#F8F4EE; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC','Helvetica Neue',sans-serif; -webkit-font-smoothing:antialiased;">

<!-- Preheader -->
<div style="display:none; font-size:1px; color:#F8F4EE; line-height:1px; max-height:0px; max-width:0px; opacity:0; overflow:hidden;">
    PersonalTeachers 每日智慧推送 — {{date_str}}
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F8F4EE;">
<tr>
<td align="center" style="padding: 28px 16px;">

<table role="presentation" width="580" cellpadding="0" cellspacing="0" border="0" style="max-width:580px; width:100%; border-radius:12px; overflow:hidden; box-shadow:0 2px 20px rgba(45,43,38,0.06);" class="email-container">

    <!-- ============ HEADER ============ -->
    <tr>
    <td style="background:linear-gradient(135deg,#E8A838 0%,#D4763C 50%,#B8533A 100%); padding:40px 32px 36px; text-align:center;" class="email-header">
        <!-- Brand mark -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto 16px;">
        <tr>
            <td style="background-color:rgba(255,255,255,0.25); border-radius:20px; padding:6px 18px;">
                <span style="font-family:Georgia,'Times New Roman',serif; font-size:12px; color:#FFFFFF; letter-spacing:3px; font-weight:600;">PERSONALTEACHERS</span>
            </td>
        </tr>
        </table>
        <!-- Title -->
        <h1 style="margin:0; font-family:Georgia,'Times New Roman','Noto Serif SC',serif; font-size:26px; color:#FFFFFF; font-weight:700; letter-spacing:2px;" class="header-title">今日人生导师智慧</h1>
        <!-- Date pill -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:14px auto 0;">
        <tr>
            <td style="background-color:rgba(255,255,255,0.2); border-radius:12px; padding:4px 14px;">
                <span style="font-size:12px; color:rgba(255,255,255,0.9); letter-spacing:0.5px;">{{date_str}}</span>
            </td>
        </tr>
        </table>
    </td>
    </tr>

    <!-- ============ CONTENT ============ -->
    <tr>
    <td style="background-color:#FFFFFF; padding:36px 32px;" class="email-content">

        <!-- Greeting -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
        <tr>
        <td style="border-left:3px solid #E8A838; padding-left:16px;">
            <p style="margin:0 0 2px; font-size:17px; color:#2D2B26; font-weight:500;">{{greeting}}，</p>
            <p style="margin:0; font-size:14px; color:#9A9488; line-height:1.5;">今日的智慧已为你准备就绪</p>
        </td>
        </tr>
        </table>

        <!-- Quote cards (injected by Python) -->
        {{quotes_html}}

        <!-- Theme distribution -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:28px;">
        <tr>
        <td style="padding:18px 0; border-top:1px solid #EDE8DF; text-align:center;">
            <p style="margin:0 0 6px; font-size:11px; color:#B5AFA3; letter-spacing:2px;">本日主题分布</p>
            <p style="margin:0; font-size:13px; color:#7A756A; line-height:1.6;">{{distribution_html}}</p>
        </td>
        </tr>
        </table>

    </td>
    </tr>

    <!-- ============ FOOTER ============ -->
    <tr>
    <td style="background-color:#FAF7F2; padding:20px 32px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
        <td style="text-align:center;">
            <p style="margin:0; font-family:Georgia,'Times New Roman',serif; font-size:12px; color:#B5AFA3;">
                PersonalTeachers &mdash; 每日人生智慧推送
            </p>
        </td>
        </tr>
        </table>
    </td>
    </tr>

</table>

</td>
</tr>
</table>

</body>
</html>
