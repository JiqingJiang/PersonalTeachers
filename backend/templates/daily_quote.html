<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日人生导师智慧</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }

        .header p {
            margin: 10px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .quote-card {
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }

        .quote-card:hover {
            transform: translateX(5px);
        }

        .quote-meta {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .quote-content {
            font-size: 15px;
            line-height: 1.7;
            color: #212529;
        }

        .distribution {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            margin-top: 30px;
        }

        .distribution p {
            margin: 0;
            font-size: 14px;
            color: #6c757d;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #6c757d;
            background: #f8f9fa;
        }

        .footer p {
            margin: 5px 0;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
            }
            .header, .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📚 今日人生导师智慧</h1>
            <p>{{date_str}}</p>
        </div>

        <!-- 内容 -->
        <div class="content">
            {{quotes_html}}

            <!-- 主题分布 -->
            <div class="distribution">
                <p>🎯 本日主题分布</p>
                <p style="margin-top: 10px;">{{distribution_html}}</p>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <p>💡 管理你的偏好 | 📚 查看历史语录</p>
            <p style="margin-top: 10px;">— Powered by PersonalTeachers —</p>
        </div>
    </div>
</body>
</html>
