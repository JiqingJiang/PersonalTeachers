name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PersonalTeachers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Admin
        run: |
          cd admin
          npm ci
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync Frontend Dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/frontend/dist/

      - name: Sync Admin Dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            admin/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/admin/dist/

      - name: Sync Backend Code
        run: |
          rsync -avz \
            --exclude='storage/' \
            --exclude='venv/' \
            --exclude='.env' \
            --exclude='__pycache__/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/backend/

      - name: Install & Restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_PATH }}/backend
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart personalteachers2
            sleep 3
            curl -sf http://127.0.0.1:8000/api/v1/health || (echo "Health check failed!" && exit 1)
            echo "Deploy successful!"